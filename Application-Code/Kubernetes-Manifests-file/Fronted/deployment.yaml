apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: three-tier
  labels:
    role: frontend
    env: demo
spec: 
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 25%
  selector:
    matchLabels: 
      role: frontend
  template:
    metadata:
      labels:
        role: frontend
    spec: 
      # imagePullSecrets:
      # - name: ecr-registry-secret
      containers:
      - name: frontend
        image: 975829620031.dkr.ecr.us-east-1.amazonaws.com/forontend-docker-image:latest
        imagePullPolicy: Always
        env:
          - name: REACT_APP_BACKEND_URL
            value: "http://backend.domeshwarthengari.com/api/tasks" # if you don't have a hosted domain change this line to your cluster ip eg: http://[IP_ADDRESS]/api/tasks
        ports:
        - containerPort: 3000